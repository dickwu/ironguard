name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: ironguard-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: ironguard-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: ironguard-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: ironguard-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set linker for cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --features "quic,pq" --bin ironguard

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz ironguard
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" &>/dev/null; then
            gh release upload "$TAG_NAME" artifacts/**/*.tar.gz --clobber
          else
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --generate-notes \
              artifacts/**/*.tar.gz
          fi

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "macos_aarch64=$(sha256sum artifacts/ironguard-macos-aarch64/ironguard-macos-aarch64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "macos_x86_64=$(sha256sum artifacts/ironguard-macos-x86_64/ironguard-macos-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_aarch64=$(sha256sum artifacts/ironguard-linux-aarch64/ironguard-linux-aarch64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(sha256sum artifacts/ironguard-linux-x86_64/ironguard-linux-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          SHA_MACOS_AARCH64: ${{ steps.hashes.outputs.macos_aarch64 }}
          SHA_MACOS_X86_64: ${{ steps.hashes.outputs.macos_x86_64 }}
          SHA_LINUX_AARCH64: ${{ steps.hashes.outputs.linux_aarch64 }}
          SHA_LINUX_X86_64: ${{ steps.hashes.outputs.linux_x86_64 }}
        run: |
          VERSION="${TAG_NAME#v}"

          FORMULA="class Ironguard < Formula
            desc \"Modern cross-platform WireGuard implementation in Rust\"
            homepage \"https://github.com/dickwu/ironguard\"
            version \"${VERSION}\"
            license \"GPL-3.0-or-later\"

            on_macos do
              on_arm do
                url \"https://github.com/dickwu/ironguard/releases/download/v#{version}/ironguard-macos-aarch64.tar.gz\"
                sha256 \"${SHA_MACOS_AARCH64}\"
              end

              on_intel do
                url \"https://github.com/dickwu/ironguard/releases/download/v#{version}/ironguard-macos-x86_64.tar.gz\"
                sha256 \"${SHA_MACOS_X86_64}\"
              end
            end

            on_linux do
              on_arm do
                url \"https://github.com/dickwu/ironguard/releases/download/v#{version}/ironguard-linux-aarch64.tar.gz\"
                sha256 \"${SHA_LINUX_AARCH64}\"
              end

              on_intel do
                url \"https://github.com/dickwu/ironguard/releases/download/v#{version}/ironguard-linux-x86_64.tar.gz\"
                sha256 \"${SHA_LINUX_X86_64}\"
              end
            end

            def install
              bin.install \"ironguard\"
            end

            test do
              assert_match version.to_s, shell_output(\"#{bin}/ironguard --version\")
            end
          end"

          EXISTING=$(gh api repos/dickwu/homebrew-tap/contents/Formula/ironguard.rb --jq '.sha')

          gh api repos/dickwu/homebrew-tap/contents/Formula/ironguard.rb \
            -X PUT \
            -f message="chore: update ironguard to ${VERSION}" \
            -f content="$(printf '%s' "$FORMULA" | base64 -w0)" \
            -f sha="$EXISTING"
